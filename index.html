<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品利润计算器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0c10;
    --bg-panel: #0f1318;
    --bg-card: #141922;
    --bg-input: #1a2130;
    --border: #1f2d3d;
    --border-bright: #2a3f58;
    --accent-gold: #e8b84b;
    --accent-gold-dim: #a07a28;
    --accent-green: #3dd68c;
    --accent-red: #ff5252;
    --accent-blue: #4da8ff;
    --text-primary: #e8edf5;
    --text-secondary: #7a90a8;
    --text-dim: #3d5068;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --glow-gold: 0 0 20px rgba(232, 184, 75, 0.25);
    --glow-green: 0 0 20px rgba(61, 214, 140, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,184,75,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,184,75,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(232,184,75,0.04) 0%, transparent 100%);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-dim));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: var(--glow-gold);
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.05em;
    color: var(--text-primary);
  }

  .logo-text span {
    color: var(--accent-gold);
  }

  .header-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Main Layout */
  .main {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 24px;
  }

  /* Panel base */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .panel:hover { border-color: var(--border-bright); }

  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-gold);
    box-shadow: 0 0 8px var(--accent-gold);
    flex-shrink: 0;
  }
  .panel-dot.green { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
  .panel-dot.blue { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }

  .panel-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .panel-body { padding: 24px; }

  /* Input row */
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .input-row.full { grid-template-columns: 1fr; }
  .input-row.three { grid-template-columns: 1fr 1fr 1fr; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field label {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .field-input-wrap {
    position: relative;
  }

  .field-prefix {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--accent-gold);
    pointer-events: none;
    z-index: 1;
  }

  .field-suffix {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-dim);
    pointer-events: none;
  }

  input[type="text"],
  input[type="number"],
  select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 40px 12px 36px;
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  input[type="text"] {
    padding: 12px 12px;
  }

  select {
    padding: 12px 12px;
    cursor: pointer;
    appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--accent-gold-dim);
    box-shadow: 0 0 0 3px rgba(232,184,75,0.1);
    background: #1e2838;
  }

  /* Slider */
  .slider-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .slider-value {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--accent-gold);
  }

  input[type="range"] {
    width: 100%;
    height: 4px;
    background: var(--bg-input);
    border-radius: 4px;
    appearance: none;
    outline: none;
    cursor: pointer;
    border: none;
  }

  input[type="range"]::-webkit-slider-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent-gold);
    box-shadow: var(--glow-gold);
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  /* Calculate button */
  .btn-calc {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-dim));
    border: none;
    border-radius: 12px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #0a0c10;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--glow-gold);
    margin-top: 8px;
  }

  .btn-calc:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 32px rgba(232,184,75,0.4);
  }
  .btn-calc:active { transform: translateY(0); }

  /* Result card */
  .result-card {
    grid-column: 1 / 3;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
  }

  .metric {
    background: var(--bg-card);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }

  .metric::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent-gold);
    transform: scaleX(0);
    transition: transform 0.4s ease;
    transform-origin: left;
  }

  .metric.active::before { transform: scaleX(1); }

  .metric-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .metric-value {
    font-family: var(--font-mono);
    font-size: 32px;
    font-weight: 600;
    color: var(--text-secondary);
    transition: color 0.4s, text-shadow 0.4s;
    letter-spacing: -0.02em;
  }

  .metric-value.positive { color: var(--accent-green); text-shadow: var(--glow-green); }
  .metric-value.negative { color: var(--accent-red); }
  .metric-value.highlight { color: var(--accent-gold); text-shadow: var(--glow-gold); }

  .metric-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Profit bar */
  .profit-bar-section {
    padding: 24px;
    border-top: 1px solid var(--border);
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .bar-track {
    height: 8px;
    background: var(--bg-input);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }

  .bar-cost { 
    height: 100%; 
    background: linear-gradient(90deg, #2a3f58, var(--accent-blue));
    border-radius: 8px 0 0 8px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    float: left;
  }

  .bar-profit {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-green), #7fffbe);
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    float: left;
  }

  /* Product list */
  .product-list-panel { grid-column: 1 / 3; }

  .list-actions {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .btn-add {
    padding: 10px 20px;
    background: rgba(232,184,75,0.1);
    border: 1px solid var(--accent-gold-dim);
    border-radius: 8px;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent-gold);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .btn-add:hover {
    background: rgba(232,184,75,0.2);
    box-shadow: var(--glow-gold);
  }

  .btn-clear {
    padding: 10px 20px;
    background: rgba(255,82,82,0.08);
    border: 1px solid rgba(255,82,82,0.3);
    border-radius: 8px;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent-red);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .btn-clear:hover { background: rgba(255,82,82,0.18); }

  /* Table */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--bg-input);
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(232,184,75,0.03); }

  tbody td {
    padding: 14px 16px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-secondary);
  }

  .td-name { color: var(--text-primary); font-weight: 500; }
  .td-profit.pos { color: var(--accent-green); }
  .td-profit.neg { color: var(--accent-red); }
  .td-rate { color: var(--accent-gold); }

  .profit-mini-bar {
    width: 80px;
    height: 4px;
    background: var(--bg-input);
    border-radius: 4px;
    overflow: hidden;
    display: inline-block;
    vertical-align: middle;
    margin-left: 8px;
  }

  .profit-mini-fill {
    height: 100%;
    background: var(--accent-green);
    border-radius: 4px;
    transition: width 0.5s;
  }

  .profit-mini-fill.neg { background: var(--accent-red); }

  .btn-del {
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .btn-del:hover {
    border-color: var(--accent-red);
    color: var(--accent-red);
    background: rgba(255,82,82,0.1);
  }

  /* Summary row */
  .summary-row {
    background: var(--bg-input);
    border-top: 2px solid var(--border-bright) !important;
  }

  .summary-row td {
    color: var(--text-primary) !important;
    font-weight: 600;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.08em;
  }

  /* Badge */
  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
  }

  .badge-loss { background: rgba(255,82,82,0.15); color: var(--accent-red); }
  .badge-low { background: rgba(77,168,255,0.15); color: var(--accent-blue); }
  .badge-mid { background: rgba(232,184,75,0.15); color: var(--accent-gold); }
  .badge-high { background: rgba(61,214,140,0.15); color: var(--accent-green); }

  /* Animate-in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel { animation: fadeUp 0.5s ease both; }
  .panel:nth-child(2) { animation-delay: 0.1s; }
  .panel:nth-child(3) { animation-delay: 0.2s; }
  .panel:nth-child(4) { animation-delay: 0.3s; }

  @keyframes countUp {
    from { opacity: 0.3; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .metric-value.animate { animation: countUp 0.3s ease; }

  /* Tooltip indicator */
  .profit-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    margin-top: 6px;
  }

  .profit-status.good {
    background: rgba(61,214,140,0.1);
    color: var(--accent-green);
    border: 1px solid rgba(61,214,140,0.2);
  }

  .profit-status.warn {
    background: rgba(232,184,75,0.1);
    color: var(--accent-gold);
    border: 1px solid rgba(232,184,75,0.2);
  }

  .profit-status.bad {
    background: rgba(255,82,82,0.1);
    color: var(--accent-red);
    border: 1px solid rgba(255,82,82,0.2);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 6px currentColor;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Responsive */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; padding: 20px; gap: 16px; }
    .result-card, .product-list-panel { grid-column: 1; }
    .metrics-grid { grid-template-columns: 1fr 1fr; }
    header { padding: 20px; }
  }

  @media (max-width: 600px) {
    .metrics-grid { grid-template-columns: 1fr; }
    .input-row { grid-template-columns: 1fr; }
    .input-row.three { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-icon">₿</div>
    <div>
      <div class="logo-text">PROFIT<span>LENS</span></div>
      <div class="header-tag">商品利润分析系统 · v1.0</div>
    </div>
  </div>
  <div class="header-tag">2026 · 智能财务工具</div>
</header>

<div class="main">

  <!-- 输入面板 -->
  <div class="panel" style="animation-delay:0s">
    <div class="panel-header">
      <div class="panel-dot"></div>
      <span class="panel-title">单品参数录入</span>
    </div>
    <div class="panel-body">
      <div class="input-row full">
        <div class="field">
          <label>商品名称</label>
          <input type="text" id="productName" placeholder="输入商品名称..." maxlength="30">
        </div>
      </div>

      <div class="input-row">
        <div class="field">
          <label>进货成本价</label>
          <div class="field-input-wrap">
            <span class="field-prefix">¥</span>
            <input type="number" id="costPrice" placeholder="0.00" min="0" step="0.01">
            <span class="field-suffix">元</span>
          </div>
        </div>
        <div class="field">
          <label>市场售价</label>
          <div class="field-input-wrap">
            <span class="field-prefix">¥</span>
            <input type="number" id="sellPrice" placeholder="0.00" min="0" step="0.01">
            <span class="field-suffix">元</span>
          </div>
        </div>
      </div>

      <div class="input-row">
        <div class="field">
          <label>销售数量</label>
          <div class="field-input-wrap">
            <span class="field-prefix">#</span>
            <input type="number" id="quantity" placeholder="1" min="1" step="1" value="1">
            <span class="field-suffix">件</span>
          </div>
        </div>
        <div class="field">
          <label>其他费用（可选）</label>
          <div class="field-input-wrap">
            <span class="field-prefix">¥</span>
            <input type="number" id="extraCost" placeholder="0.00" min="0" step="0.01">
            <span class="field-suffix">元</span>
          </div>
        </div>
      </div>

      <div class="input-row full" style="margin-bottom:20px">
        <div class="field">
          <label>折扣力度</label>
          <div class="slider-wrap">
            <div class="slider-labels">
              <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);">无折扣</span>
              <span class="slider-value" id="discountDisplay">100%</span>
            </div>
            <input type="range" id="discount" min="10" max="100" value="100" step="5">
          </div>
        </div>
      </div>

      <button class="btn-calc" onclick="calculate()">▶ 立即计算利润</button>
    </div>
  </div>

  <!-- 快捷预设 -->
  <div class="panel" style="animation-delay:0.08s">
    <div class="panel-header">
      <div class="panel-dot blue"></div>
      <span class="panel-title">行业利润基准</span>
    </div>
    <div class="panel-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <button class="preset-btn" onclick="applyPreset(100,150,1,0)" style="padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);cursor:pointer;font-family:var(--font-mono);font-size:12px;text-align:left;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent-gold-dim)'" onmouseout="this.style.borderColor='var(--border)'">
          <div style="color:var(--text-dim);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">服装零售</div>
          <div>成本¥100 → 售¥150</div>
          <div style="color:var(--accent-green);margin-top:3px">+50% 毛利</div>
        </button>
        <button class="preset-btn" onclick="applyPreset(50,80,1,5)" style="padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);cursor:pointer;font-family:var(--font-mono);font-size:12px;text-align:left;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent-gold-dim)'" onmouseout="this.style.borderColor='var(--border)'">
          <div style="color:var(--text-dim);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">餐饮食品</div>
          <div>成本¥50 → 售¥80</div>
          <div style="color:var(--accent-green);margin-top:3px">+60% 毛利</div>
        </button>
        <button class="preset-btn" onclick="applyPreset(200,260,1,20)" style="padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);cursor:pointer;font-family:var(--font-mono);font-size:12px;text-align:left;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent-gold-dim)'" onmouseout="this.style.borderColor='var(--border)'">
          <div style="color:var(--text-dim);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">3C 数码</div>
          <div>成本¥200 → 售¥260</div>
          <div style="color:var(--accent-blue);margin-top:3px">+30% 毛利</div>
        </button>
        <button class="preset-btn" onclick="applyPreset(300,600,1,0)" style="padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);cursor:pointer;font-family:var(--font-mono);font-size:12px;text-align:left;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent-gold-dim)'" onmouseout="this.style.borderColor='var(--border)'">
          <div style="color:var(--text-dim);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px">美妆护肤</div>
          <div>成本¥300 → 售¥600</div>
          <div style="color:var(--accent-gold);margin-top:3px">+100% 毛利</div>
        </button>
      </div>

      <!-- Mini calculator: 目标利润率反推 -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px">
        <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px">目标利润率 → 建议售价</div>
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end">
          <div class="field">
            <label>成本价 ¥</label>
            <div class="field-input-wrap">
              <span class="field-prefix">¥</span>
              <input type="number" id="revCost" placeholder="100" min="0" step="0.01">
            </div>
          </div>
          <div class="field">
            <label>目标利润率</label>
            <div class="field-input-wrap">
              <input type="number" id="revTarget" placeholder="30" min="0" max="999" step="1" style="padding-left:12px">
              <span class="field-suffix">%</span>
            </div>
          </div>
          <button onclick="reverseCalc()" style="padding:12px 16px;background:rgba(77,168,255,0.12);border:1px solid rgba(77,168,255,0.3);border-radius:10px;color:var(--accent-blue);cursor:pointer;font-family:var(--font-mono);font-size:12px;font-weight:600;white-space:nowrap;transition:all 0.2s" onmouseover="this.style.background='rgba(77,168,255,0.22)'" onmouseout="this.style.background='rgba(77,168,255,0.12)'">计算</button>
        </div>
        <div id="revResult" style="margin-top:12px;font-family:var(--font-mono);font-size:13px;color:var(--text-dim)">输入成本价与目标利润率后点击计算</div>
      </div>
    </div>
  </div>

  <!-- 结果仪表盘 -->
  <div class="panel result-card">
    <div class="panel-header">
      <div class="panel-dot green"></div>
      <span class="panel-title">利润分析结果</span>
      <div id="profitStatus" style="margin-left:auto"></div>
    </div>

    <div class="metrics-grid">
      <div class="metric" id="metricGross">
        <div class="metric-label">单件毛利润</div>
        <div class="metric-value" id="grossProfit">—</div>
        <div class="metric-sub">售价 - 成本</div>
      </div>
      <div class="metric" id="metricNet">
        <div class="metric-label">净利润（含费用）</div>
        <div class="metric-value" id="netProfit">—</div>
        <div class="metric-sub">扣除其他费用后</div>
      </div>
      <div class="metric" id="metricRate">
        <div class="metric-label">利润率</div>
        <div class="metric-value" id="profitRate">—</div>
        <div class="metric-sub">净利 ÷ 成本</div>
      </div>
      <div class="metric" id="metricTotal">
        <div class="metric-label">总利润</div>
        <div class="metric-value" id="totalProfit">—</div>
        <div class="metric-sub" id="totalSub">× 数量</div>
      </div>
    </div>

    <div class="profit-bar-section">
      <div class="bar-label">
        <span>成本占比</span>
        <span id="barCostPct">—</span>
        <span id="barProfitPct">—</span>
        <span>利润占比</span>
      </div>
      <div class="bar-track" id="profitBar">
        <div class="bar-cost" id="barCost" style="width:0%"></div>
        <div class="bar-profit" id="barProfitFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- 商品列表 -->
  <div class="panel product-list-panel">
    <div class="panel-header">
      <div class="panel-dot"></div>
      <span class="panel-title">批量商品管理</span>
      <span id="productCount" style="margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">0 件商品</span>
    </div>
    <div class="panel-body">
      <div class="list-actions">
        <button class="btn-add" onclick="addCurrentProduct()">＋ 加入列表</button>
        <button class="btn-clear" onclick="clearList()">✕ 清空列表</button>
        <div style="margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);align-self:center">点击「立即计算」后可加入列表</div>
      </div>
      <div class="table-wrap">
        <table id="productTable">
          <thead>
            <tr>
              <th>商品名称</th>
              <th>成本价</th>
              <th>售价</th>
              <th>折扣</th>
              <th>数量</th>
              <th>单件净利</th>
              <th>总利润</th>
              <th>利润率</th>
              <th>评级</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="productListBody">
            <tr><td colspan="10" class="empty-state">暂无商品 · 计算后点击「加入列表」添加</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
  // State
  let products = [];
  let lastResult = null;

  // Discount slider
  const discountSlider = document.getElementById('discount');
  const discountDisplay = document.getElementById('discountDisplay');
  discountSlider.addEventListener('input', () => {
    discountDisplay.textContent = discountSlider.value + '%';
  });

  // Enter key triggers calc
  ['costPrice','sellPrice','quantity','extraCost'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });
  });

  function fmtMoney(val) {
    const abs = Math.abs(val);
    const sign = val < 0 ? '-' : '';
    if (abs >= 10000) {
      return sign + '¥' + (abs / 10000).toFixed(2) + '万';
    }
    return sign + '¥' + abs.toFixed(2);
  }

  function fmtMoneyFull(val) {
    const sign = val < 0 ? '-' : '';
    return sign + '¥' + Math.abs(val).toFixed(2);
  }

  function calculate() {
    const name = document.getElementById('productName').value.trim() || '未命名商品';
    const cost = parseFloat(document.getElementById('costPrice').value) || 0;
    const sellRaw = parseFloat(document.getElementById('sellPrice').value) || 0;
    const qty = parseInt(document.getElementById('quantity').value) || 1;
    const extra = parseFloat(document.getElementById('extraCost').value) || 0;
    const discount = parseInt(discountSlider.value) / 100;

    if (cost <= 0 || sellRaw <= 0) {
      shakeElement(document.querySelector('.btn-calc'));
      return;
    }

    const sell = sellRaw * discount;
    const grossProfit = sell - cost;
    const netProfit = grossProfit - extra;
    const profitRate = cost > 0 ? (netProfit / cost) * 100 : 0;
    const totalProfit = netProfit * qty;
    const grossMargin = sellRaw > 0 ? (netProfit / sell) * 100 : 0;
    const costPct = cost / sell * 100;
    const profitPct = Math.max(0, netProfit / sell * 100);

    lastResult = { name, cost, sell: sellRaw, discount: discount*100, qty, extra, grossProfit, netProfit, profitRate, totalProfit, grossMargin };

    // Update metrics
    setMetric('grossProfit', fmtMoney(grossProfit), grossProfit >= 0 ? 'positive' : 'negative');
    setMetric('netProfit', fmtMoney(netProfit), netProfit >= 0 ? 'positive' : 'negative');
    setMetric('profitRate', profitRate.toFixed(1) + '%', profitRate > 20 ? 'highlight' : profitRate >= 0 ? 'positive' : 'negative');
    setMetric('totalProfit', fmtMoney(totalProfit), totalProfit >= 0 ? 'positive' : 'negative');

    document.getElementById('totalSub').textContent = `× ${qty} 件 共计`;

    // Activate metrics
    ['metricGross','metricNet','metricRate','metricTotal'].forEach(id => {
      document.getElementById(id).classList.add('active');
    });

    // Bar
    const safeCP = Math.min(100, Math.max(0, costPct));
    const safePP = Math.min(100 - safeCP, Math.max(0, profitPct));
    document.getElementById('barCost').style.width = safeCP + '%';
    document.getElementById('barProfitFill').style.width = safePP + '%';
    document.getElementById('barCostPct').textContent = `成本 ${safeCP.toFixed(1)}%`;
    document.getElementById('barProfitPct').textContent = `利润 ${(netProfit/sell*100).toFixed(1)}%`;

    // Status badge
    const statusEl = document.getElementById('profitStatus');
    if (profitRate >= 30) {
      statusEl.innerHTML = '<span class="profit-status good"><span class="status-dot"></span>高利润</span>';
    } else if (profitRate >= 10) {
      statusEl.innerHTML = '<span class="profit-status warn"><span class="status-dot"></span>中等利润</span>';
    } else if (profitRate >= 0) {
      statusEl.innerHTML = '<span class="profit-status warn"><span class="status-dot"></span>低利润</span>';
    } else {
      statusEl.innerHTML = '<span class="profit-status bad"><span class="status-dot"></span>亏损</span>';
    }
  }

  function setMetric(id, val, cls) {
    const el = document.getElementById(id);
    el.className = 'metric-value animate ' + cls;
    el.textContent = val;
    setTimeout(() => el.classList.remove('animate'), 300);
  }

  function shakeElement(el) {
    el.style.animation = 'none';
    el.style.transform = 'translateX(0)';
    let i = 0;
    const shakes = [-6, 6, -4, 4, -2, 2, 0];
    const interval = setInterval(() => {
      if (i >= shakes.length) { clearInterval(interval); el.style.transform = ''; return; }
      el.style.transform = `translateX(${shakes[i++]}px)`;
    }, 40);
  }

  function applyPreset(cost, sell, qty, extra) {
    document.getElementById('costPrice').value = cost;
    document.getElementById('sellPrice').value = sell;
    document.getElementById('quantity').value = qty;
    document.getElementById('extraCost').value = extra;
    discountSlider.value = 100;
    discountDisplay.textContent = '100%';
    calculate();
  }

  function reverseCalc() {
    const cost = parseFloat(document.getElementById('revCost').value);
    const target = parseFloat(document.getElementById('revTarget').value);
    const el = document.getElementById('revResult');

    if (!cost || cost <= 0 || isNaN(target)) {
      el.style.color = 'var(--accent-red)';
      el.textContent = '请输入有效的成本价与目标利润率';
      return;
    }

    // 两种算法
    const suggestByMarkup = cost * (1 + target / 100);  // 成本加成
    const suggestByMargin = cost / (1 - target / 100);  // 利润率

    el.style.color = 'var(--text-primary)';
    el.innerHTML = `
      <span style="color:var(--accent-blue)">成本加成法</span>：建议售价 <span style="color:var(--accent-gold);font-weight:600">${fmtMoneyFull(suggestByMarkup)}</span>
      &nbsp;·&nbsp;
      <span style="color:var(--accent-blue)">毛利率法</span>：建议售价 <span style="color:var(--accent-green);font-weight:600">${fmtMoneyFull(suggestByMargin)}</span>
    `;
  }

  function getRateBadge(rate) {
    if (rate < 0) return '<span class="badge badge-loss">亏损</span>';
    if (rate < 15) return '<span class="badge badge-low">偏低</span>';
    if (rate < 40) return '<span class="badge badge-mid">中等</span>';
    return '<span class="badge badge-high">优秀</span>';
  }

  function addCurrentProduct() {
    if (!lastResult) {
      alert('请先点击「立即计算利润」');
      return;
    }
    products.push({ ...lastResult, id: Date.now() });
    renderList();
  }

  function deleteProduct(id) {
    products = products.filter(p => p.id !== id);
    renderList();
  }

  function clearList() {
    if (products.length === 0) return;
    products = [];
    renderList();
  }

  function renderList() {
    const tbody = document.getElementById('productListBody');
    document.getElementById('productCount').textContent = `${products.length} 件商品`;

    if (products.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty-state">暂无商品 · 计算后点击「加入列表」添加</td></tr>';
      return;
    }

    let html = '';
    let totalCost = 0, totalRevenue = 0, totalNet = 0, totalQty = 0;

    products.forEach(p => {
      const actualSell = p.sell * (p.discount / 100);
      totalCost += p.cost * p.qty;
      totalRevenue += actualSell * p.qty;
      totalNet += p.totalProfit;
      totalQty += p.qty;

      const pctWidth = Math.min(100, Math.max(0, p.profitRate));
      html += `
        <tr>
          <td class="td-name">${escHtml(p.name)}</td>
          <td>${fmtMoneyFull(p.cost)}</td>
          <td>${fmtMoneyFull(p.sell)}${p.discount < 100 ? ` <small style="color:var(--accent-gold)">${p.discount}折</small>` : ''}</td>
          <td style="font-family:var(--font-mono);color:var(--text-dim)">${p.discount}%</td>
          <td style="font-family:var(--font-mono)">${p.qty}</td>
          <td class="td-profit ${p.netProfit >= 0 ? 'pos' : 'neg'}">${fmtMoneyFull(p.netProfit)}</td>
          <td class="td-profit ${p.totalProfit >= 0 ? 'pos' : 'neg'}" style="font-weight:600">${fmtMoney(p.totalProfit)}</td>
          <td class="td-rate">${p.profitRate.toFixed(1)}%<span class="profit-mini-bar"><span class="profit-mini-fill ${p.profitRate < 0 ? 'neg' : ''}" style="width:${pctWidth}%"></span></span></td>
          <td>${getRateBadge(p.profitRate)}</td>
          <td><button class="btn-del" onclick="deleteProduct(${p.id})">删除</button></td>
        </tr>`;
    });

    // Summary row
    const summaryRate = totalCost > 0 ? (totalNet / totalCost * 100) : 0;
    html += `
      <tr class="summary-row">
        <td>汇总 (${products.length} 种商品)</td>
        <td>${fmtMoney(totalCost)}</td>
        <td>${fmtMoney(totalRevenue)}</td>
        <td>—</td>
        <td>${totalQty}</td>
        <td>—</td>
        <td class="${totalNet >= 0 ? 'td-profit pos' : 'td-profit neg'}" style="font-size:16px">${fmtMoney(totalNet)}</td>
        <td class="td-rate" style="font-size:14px">${summaryRate.toFixed(1)}%</td>
        <td>${getRateBadge(summaryRate)}</td>
        <td>—</td>
      </tr>`;

    tbody.innerHTML = html;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
